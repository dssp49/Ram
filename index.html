<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Interactive Website</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        transition: 0.3s ease;
        text-align: center;
    }

    header {
        padding: 40px 20px;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        opacity: 0.9;
    }

    .container {
        margin-top: 40px;
    }

    button {
        padding: 12px 25px;
        font-size: 1rem;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s ease;
        background: white;
        color: #333;
    }

    button:hover {
        transform: scale(1.1);
        background: #222;
        color: white;
    }

    .card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        display: inline-block;
        margin-top: 30px;
        transition: 0.3s ease;
    }

    .dark {
        background: #121212;
        color: #f1f1f1;
    }

    footer {
        margin-top: 50px;
        padding: 20px;
        font-size: 0.9rem;
        opacity: 0.8;
    }
</style>
</head>

<body>

<header>
    <h1>Test Website</h1>
    <p>A simple test project</p>
</header>

<div class="container">
    <div class="card">
        <h2>Click the Button!</h2>
        <p id="message">Press the button below 👇</p>
        <button onclick="changeText()">Click Me</button>
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
</div>

<footer>
    © 2026 Simple Test Website | Made with ❤️ | By Ram
</footer>

<script>
    function changeText() {
        const message = document.getElementById("message");
        message.innerText = "🎉 You clicked the button! Awesome!";
        message.style.color = "#ffeb3b";
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }
</script>

</body>

</html>
